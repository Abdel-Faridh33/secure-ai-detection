# Configuration automatique des datasources Grafana
# Provisioning : Les datasources sont configurees automatiquement au demarrage

apiVersion: 1

datasources:
  # Prometheus - Metriques
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: "15s"

  # Loki - Logs
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData:
      maxLines: 1000
