<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion – SecureDetect</title>
    <link rel="stylesheet" href="assets/css/shared.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 400px;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 1.75rem;
        }

        .auth-logo-icon {
            width: 52px;
            height: 52px;
            background: var(--primary);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.875rem;
        }

        .auth-logo-icon svg {
            width: 26px;
            height: 26px;
            stroke: white;
        }

        .auth-logo-name {
            font-size: 1.375rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
            display: block;
        }

        .auth-logo-sub {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-top: 0.2rem;
        }

        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-lg);
        }

        .auth-card-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.25rem;
        }

        .auth-card-subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 1.75rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.25rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .auth-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-logo">
            <div class="auth-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    <polyline points="9 12 11 14 15 10"/>
                </svg>
            </div>
            <span class="auth-logo-name">SecureDetect</span>
            <span class="auth-logo-sub">Plateforme de détection d'arme à feu</span>
        </div>

        <div class="auth-card">
            <p class="auth-card-title">Connexion</p>
            <p class="auth-card-subtitle">Saisissez vos identifiants pour accéder à la plateforme.</p>

            <div class="error-message" id="errorMessage">Identifiants incorrects</div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Nom d'utilisateur</label>
                    <input type="text" id="username" name="username" required
                           autocomplete="username" placeholder="Votre identifiant">
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" required
                           autocomplete="current-password" placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">Se connecter</button>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                </div>
            </form>

            <div class="auth-footer">
                Pas encore de compte ? <a href="register.html">S'inscrire</a>
            </div>
        </div>
    </div>

    <script src="assets/js/api.js?v=2"></script>
    <script>
        const loginForm    = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const loginBtn     = document.getElementById('loginBtn');
        const loading      = document.getElementById('loading');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            errorMessage.classList.remove('show');
            loginBtn.disabled = true;
            loading.classList.add('show');

            try {
                const res = await fetch(`${API_BASE_URL}/security/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (!res.ok) throw new Error();
                const result = await res.json();

                localStorage.setItem('access_token', result.access_token);
                localStorage.setItem('user_role', result.role);
                localStorage.setItem('user_name', username);
                localStorage.setItem('user_permissions', JSON.stringify(result.permissions));

                window.location.href = result.role === 'admin' ? 'admin.html' : 'index.html';
            } catch {
                errorMessage.textContent = 'Identifiants incorrects. Veuillez réessayer.';
                errorMessage.classList.add('show');
            } finally {
                loginBtn.disabled = false;
                loading.classList.remove('show');
            }
        });

        window.addEventListener('load', () => {
            const token = localStorage.getItem('access_token');
            const role  = localStorage.getItem('user_role');
            if (!token) return;
            fetch(`${API_BASE_URL}/security/me`, { headers: { 'Authorization': `Bearer ${token}` } })
                .then(r => {
                    if (r.ok) {
                        window.location.href = role === 'admin' ? 'admin.html' : 'index.html';
                    } else {
                        ['access_token', 'user_role', 'user_name', 'user_permissions']
                            .forEach(k => localStorage.removeItem(k));
                    }
                })
                .catch(() => {});
        });
    </script>
</body>
</html>
