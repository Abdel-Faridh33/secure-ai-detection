# Nginx – Reverse-proxy sécurisé (Zone 3 & Zone 4)
# Architecture de Sécurisation IA
#
# Fonctionnalités de sécurité :
#   - Rate limiting (Zone 3 : limitation du débit)
#   - TLS 1.2/1.3 + HSTS (Zone 3 : chiffrement en transit)
#   - Security headers (Zone 3 : protection navigateur)
#   - Redirection HTTP → HTTPS (Zone 3)
#   - Reverse-proxy vers secured-api uniquement

events {
    worker_connections 1024;
}

http {
    # ─── Rate limiting (Zone 3) ───────────────────────────────────
    # Limite par IP : 30 requêtes/minute pour l'API de prédiction
    limit_req_zone $binary_remote_addr zone=predict_limit:10m rate=30r/m;
    # Limite globale API : 200 requêtes/minute par IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=200r/m;

    # Journaux
    log_format security_log '$remote_addr [$time_local] "$request" '
                             '$status $body_bytes_sent "$http_referer" '
                             '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log security_log;
    error_log  /var/log/nginx/error.log warn;

    # Upstream : modèle secured uniquement
    upstream secured_backend {
        server secured-api:8000;
        keepalive 32;
    }

    # ─── Redirection HTTP → HTTPS ─────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health-check nginx (utile pour le docker healthcheck)
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Tout le reste → HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── Serveur HTTPS ────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name localhost;

        # TLS (Zone 3)
        ssl_certificate     /etc/nginx/ssl/nginx-selfsigned.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers (Zone 3)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options            "DENY"                                         always;
        add_header X-Content-Type-Options     "nosniff"                                      always;
        add_header X-XSS-Protection           "1; mode=block"                                always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
        add_header Content-Security-Policy    "default-src 'self'"                           always;

        # Taille max upload (images)
        client_max_body_size 10M;

        # ── /predict : rate limit strict (Zone 3 + Zone 4) ────────
        location /predict {
            limit_req zone=predict_limit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass         http://secured_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # ── Reste de l'API (audit, metrics, health…) ──────────────
        location / {
            limit_req zone=api_limit burst=50 nodelay;
            limit_req_status 429;

            proxy_pass         http://secured_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }
    }
}
