# Docker Compose pour la production
version: '3.8'

services:
  # API Baseline
  baseline-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.baseline
    container_name: baseline-api1
    ports:
      - "8001:8000"
    environment:
      - MODEL_TYPE=baseline
      - LOG_LEVEL=INFO
    volumes:
      - ../models/baseline:/app/models/baseline:ro
    restart: unless-stopped
    networks:
      - secure-ai-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # API Sécurisée
  secured-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.secured
    container_name: secured-api1
    ports:
      - "8002:8000"
    environment:
      - MODEL_TYPE=secured
      - ENABLE_DEFENSES=true
      - LOG_LEVEL=INFO
    volumes:
      - ../models/secured:/app/models/secured:ro
    restart: unless-stopped
    networks:
      - secure-ai-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: secure-ai-nginx1
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../configs/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - baseline-api
      - secured-api
    restart: unless-stopped
    networks:
      - secure-ai-network

  # Monitoring en production
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-prod1
    volumes:
      - ../configs/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - secure-ai-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana-prod1
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=https://monitoring.secure-ai.local
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - secure-ai-network

networks:
  secure-ai-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
