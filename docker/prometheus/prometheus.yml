# Configuration Prometheus
# Collecte de metriques pour l'API de detection

global:
  scrape_interval: 15s  # Collecte toutes les 15 secondes
  evaluation_interval: 15s  # Evaluation des regles d'alertes
  external_labels:
    cluster: 'secure-detection-api'
    environment: 'production'

# Configuration des alertes
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Regles d'alertes
rule_files:
  - 'alerts.yml'

# Cibles de collecte (scrape targets)
scrape_configs:
  # Metriques de l'API principale
  - job_name: 'secure-detection-api'
    static_configs:
      - targets:
          - host.docker.internal:8000  # API FastAPI
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Metriques de Prometheus lui-meme
  - job_name: 'prometheus'
    static_configs:
      - targets:
          - localhost:9090

  # Metriques de Grafana
  - job_name: 'grafana'
    static_configs:
      - targets:
          - grafana:3000

  # Metriques de Loki
  - job_name: 'loki'
    static_configs:
      - targets:
          - loki:3100
