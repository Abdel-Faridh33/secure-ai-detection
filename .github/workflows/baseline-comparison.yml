name: Baseline Comparison
on:
  workflow_dispatch:
  
jobs:
  compare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Build images
        run: docker-compose -f docker/docker-compose.dev.yml build
      - name: Compare models
        run: docker-compose -f docker/docker-compose.dev.yml run --rm dev python src/experiments/comparative/run_all_experiments.py
