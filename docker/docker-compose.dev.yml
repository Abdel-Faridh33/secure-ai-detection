# Docker Compose – Développement
# Stack minimale orientée développement/debug du modèle Secured uniquement

services:

  # ─── API Secured (hot-reload, debug) ──────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: secure-ai-dev
    volumes:
      - ../:/workspace
      - ~/.ssh:/root/.ssh:ro
      - ../docker/entrypoint-dev.sh:/entrypoint.sh:ro
    ports:
      - "0.0.0.0:9800:8000"    # API – accessible réseau local pour tests multi-IP
      - "127.0.0.1:5680:5678"   # debugpy (VSCode attach)
    environment:
      - PYTHONPATH=/workspace
      - MODEL_TYPE=secured
      - ENABLE_DEFENSES=true
      - JWT_SECRET=${JWT_SECRET:-dev-jwt-secret-change-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - AGENT_PASSWORD=${AGENT_PASSWORD:-agent123}
      - MODEL_ENCRYPTION_KEY=${MODEL_ENCRYPTION_KEY:-SecureAI_2024_Production}
      - ALLOWED_ORIGINS=*
      - RATE_LIMIT=50
      - LOG_LEVEL=DEBUG
    stdin_open: true
    tty: true
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      - secure-ai-dev

  # ─── Tests automatisés ────────────────────────────────────────
  test:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test
    container_name: secure-ai-test
    volumes:
      - ../:/app
      - test-results:/app/htmlcov
    environment:
      - PYTHONPATH=/app
      - MODEL_TYPE=secured
    networks:
      - secure-ai-dev

  # ─── PostgreSQL – Audit trail (dev) ───────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: secure-ai-db-dev
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-secure_ai}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secure_password_dev}
      - POSTGRES_DB=${POSTGRES_DB:-ai_metrics}
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - secure-ai-dev

  # ─── Redis – Cache (dev) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: secure-ai-redis-dev
    ports:
      - "127.0.0.1:6380:6379"
    networks:
      - secure-ai-dev

  # ─── Prometheus (dev) ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: secure-ai-prometheus-dev
    volumes:
      - ../configs/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../configs/monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-dev-data:/prometheus
    ports:
      - "127.0.0.1:9890:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - secure-ai-dev

  # ─── Grafana (dev) ────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: secure-ai-grafana-dev
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/ai-detection-dashboard.json
    volumes:
      - grafana-dev-data:/var/lib/grafana
      - ../configs/monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ../configs/monitoring/grafana-datasources:/etc/grafana/provisioning/datasources
    ports:
      - "127.0.0.1:3500:3000"
    depends_on:
      - prometheus
    networks:
      - secure-ai-dev

  # ─── Interface Web (dev) ──────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: secure-ai-web-dev
    ports:
      - "0.0.0.0:8800:80"
    volumes:
      - ../web:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - secure-ai-dev

networks:
  secure-ai-dev:
    driver: bridge

volumes:
  postgres-dev-data:
  prometheus-dev-data:
  grafana-dev-data:
  test-results:
