global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # API Services - Dev mode
  - job_name: 'dev-api'
    static_configs:
      - targets: ['dev:8000']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  # API Services - Production mode
  # Uncomment when running in production with separate services
  # - job_name: 'baseline-api'
  #   static_configs:
  #     - targets: ['baseline-api:8000']
  #   metrics_path: /metrics
  #   scrape_interval: 10s
  #   scrape_timeout: 5s
  #
  # - job_name: 'secured-api'
  #   static_configs:
  #     - targets: ['secured-api:8000']
  #   metrics_path: /metrics
  #   scrape_interval: 10s
  #   scrape_timeout: 5s

  # Infrastructure Services
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s

  # Optionnel: Services de monitoring additionnels
  # Décommenter si vous ajoutez ces services au docker-compose.prod.yml
  # - job_name: 'node-exporter'
  #   static_configs:
  #     - targets: ['node-exporter:9100']
  #   scrape_interval: 30s
  #
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres:9187']
  #   scrape_interval: 30s
  #
