<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Secure AI Detection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            background: white;
            border-radius: 12px;
            padding: 50px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 2.2em;
            margin-bottom: 10px;
            color: #2c3e50;
            
            
        }

        .header p {
            color: #666;
            font-size: 1em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
            background: white;
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .register-btn {
            width: 100%;
            background: #3498db;
            color: white;
            border: none;
            padding: 16px 30px;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            font-weight: 600;
        }

        .register-btn:hover:not(:disabled) {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }

        .register-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #c33;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        .success-message {
            background: #efe;
            color: #3a3;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #3a3;
        }

        .success-message.show {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 0.95em;
        }

        .login-link a {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: #2980b9;
            text-decoration: underline;
        }

        .password-requirements {
            background: #f8f9ff;
            border-radius: 8px;
            padding: 12px;
            margin-top: 10px;
            font-size: 0.85em;
            color: #555;
        }

        .password-requirements ul {
            margin-left: 20px;
            margin-top: 5px;
        }

        .password-requirements li {
            margin: 3px 0;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .register-container {
                padding: 30px;
            }

            .header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="header">
            <h1>Inscription</h1>
            <p>Créer votre compte Secure AI Detection</p>
        </div>

        <div class="error-message" id="errorMessage">
            Erreur lors de l'inscription
        </div>

        <div class="success-message" id="successMessage">
            Compte créé avec succès! Redirection...
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label for="username">Nom d'utilisateur *</label>
                <input type="text" id="username" name="username" required
                       placeholder="Minimum 3 caractères"
                       minlength="3">
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required
                       placeholder="votre@email.com">
            </div>

            <div class="form-group">
                <label for="password">Mot de passe *</label>
                <input type="password" id="password" name="password" required
                       placeholder="Minimum 6 caractères"
                       minlength="6">

                <div class="password-requirements">
                    <strong>Exigences du mot de passe:</strong>
                    <ul>
                        <li>Au moins 6 caractères</li>
                        <li>Recommandé: mélange de lettres, chiffres et symboles</li>
                    </ul>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmer le mot de passe *</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required
                       placeholder="Retapez votre mot de passe">
            </div>

            <button type="submit" class="register-btn" id="registerBtn">
                Créer mon compte
            </button>

            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>
        </form>

        <div class="login-link">
            Vous avez déjà un compte?
            <a href="login.html">Se connecter</a>
        </div>
    </div>

    <script>
        // Configuration de l'API adaptée à l'environnement
        const API_BASE_URL = window.location.port === '8080'
            ? 'http://localhost/api/secured'  // Production via Nginx
            : 'http://localhost:9800';        // Dev direct

        const registerForm = document.getElementById('registerForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const registerBtn = document.getElementById('registerBtn');
        const loading = document.getElementById('loading');

        registerForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Masquer les messages précédents
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');

            // Validation côté client
            if (password !== confirmPassword) {
                errorMessage.textContent = 'Les mots de passe ne correspondent pas';
                errorMessage.classList.add('show');
                return;
            }

            if (username.length < 3) {
                errorMessage.textContent = 'Le nom d\'utilisateur doit contenir au moins 3 caractères';
                errorMessage.classList.add('show');
                return;
            }

            if (password.length < 6) {
                errorMessage.textContent = 'Le mot de passe doit contenir au moins 6 caractères';
                errorMessage.classList.add('show');
                return;
            }

            // Afficher le loading
            registerBtn.disabled = true;
            loading.classList.add('show');

            try {
                const response = await fetch(`${API_BASE_URL}/security/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        email: email,
                        role: 'guest'
                    })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.detail || 'Erreur lors de l\'inscription');
                }

                // Sauvegarder le token et les infos utilisateur
                localStorage.setItem('access_token', result.access_token);
                localStorage.setItem('user_role', result.role);
                localStorage.setItem('user_name', username);
                localStorage.setItem('user_permissions', JSON.stringify(result.permissions));

                // Afficher succès
                successMessage.textContent = 'Compte créé avec succès! Redirection vers l\'application...';
                successMessage.classList.add('show');

                // Redirection vers l'interface principale après 2 secondes
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);

            } catch (error) {
                console.error('Erreur d\'inscription:', error);
                errorMessage.textContent = error.message || 'Une erreur est survenue lors de l\'inscription';
                errorMessage.classList.add('show');
            } finally {
                registerBtn.disabled = false;
                loading.classList.remove('show');
            }
        });

        // Vérifier si déjà connecté
        window.addEventListener('load', function() {
            const token = localStorage.getItem('access_token');
            if (token) {
                // Déjà connecté, redirection
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
