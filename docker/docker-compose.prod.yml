# Docker Compose – Production
# Architecture de Sécurisation IA : modèle Secured uniquement
#
# Stack :
#   secured-api  – API FastAPI (MobileNetV2 sécurisé)
#   nginx        – Reverse-proxy HTTPS + rate-limiting
#   postgres     – Audit trail et métriques
#   redis        – Cache et file d'attente
#   prometheus   – Collecte de métriques
#   grafana      – Tableaux de bord sécurité
#   alertmanager – Alertes (WAF, attaques, anomalies)

version: '3.8'

services:

  # ─── API Secured (seul modèle en production) ──────────────────
  secured-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.secured
    container_name: secure-ai-api
    expose:
      - "8000"            # accessible uniquement via nginx, pas de port hôte direct
    environment:
      - MODEL_TYPE=secured
      - ENABLE_DEFENSES=true
      - LOG_LEVEL=INFO
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-secure_ai}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secure_password}
      - POSTGRES_DB=${POSTGRES_DB:-ai_metrics}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - MODEL_ENCRYPTION_KEY=${MODEL_ENCRYPTION_KEY:-SecureAI_2024_Production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://secure-ai.local}
    volumes:
      - ../models/secured:/app/models/secured:ro
      - ../logs/audit:/app/logs/audit
    restart: unless-stopped
    networks:
      - secure-ai-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Nginx – Reverse-proxy HTTPS + rate-limiting ──────────────
  nginx:
    image: nginx:alpine
    container_name: secure-ai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../configs/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - secured-api
    restart: unless-stopped
    networks:
      - secure-ai-network

  # ─── Interface Web (tableau de bord) ──────────────────────────
  web:
    image: nginx:alpine
    container_name: secure-ai-web
    ports:
      - "8080:80"
    volumes:
      - ../configs/nginx/web.conf:/etc/nginx/conf.d/default.conf:ro
      - ../web:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - secure-ai-network

  # ─── PostgreSQL – Audit trail et métriques ────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: secure-ai-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-secure_ai}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-secure_password}
      - POSTGRES_DB=${POSTGRES_DB:-ai_metrics}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5434:5432"   # localhost uniquement
    restart: unless-stopped
    networks:
      - secure-ai-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-secure_ai} -d ${POSTGRES_DB:-ai_metrics}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis – Cache et sessions ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: secure-ai-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_password}
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - secure-ai-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_password}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Prometheus – Collecte métriques ──────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: secure-ai-prometheus
    volumes:
      - ../configs/monitoring/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - ../configs/monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"   # localhost uniquement
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - secure-ai-network

  # ─── Grafana – Tableaux de bord sécurité ──────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: secure-ai-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme_in_prod}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://monitoring.secure-ai.local
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ../configs/monitoring/grafana-datasources:/etc/grafana/provisioning/datasources:ro
      - ../configs/monitoring/grafana-dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"   # localhost uniquement
    restart: unless-stopped
    networks:
      - secure-ai-network
    depends_on:
      - prometheus

networks:
  secure-ai-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  nginx-logs:
