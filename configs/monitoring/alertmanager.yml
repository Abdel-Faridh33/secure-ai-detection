global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'default'
      repeat_interval: 1h

receivers:
  - name: 'default'
    # Configurer selon l'environnement de déploiement.
    # Exemples : email_configs, slack_configs, webhook_configs

# Supprime les alertes 'warning' quand une alerte 'critical' de même nom est active
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
