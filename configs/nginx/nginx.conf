events {
    worker_connections 1024;
}

http {
    upstream baseline_backend {
        server baseline-api:8000;
    }

    upstream secured_backend {
        server secured-api:8000;
    }

    # Serveur HTTP (pour développement et API)
    server {
        listen 80;
        server_name localhost;

        # Limite de taille pour upload d'images
        client_max_body_size 10M;

        # API Baseline
        location /api/baseline/ {
            proxy_pass http://baseline_backend/;
            proxy_set_header Host \$host;
            proxy_set_header X-Real-IP \$remote_addr;
            proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto \$scheme;
        }

        # API Sécurisée
        location /api/secured/ {
            proxy_pass http://secured_backend/;
            proxy_set_header Host \$host;
            proxy_set_header X-Real-IP \$remote_addr;
            proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto \$scheme;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
        }
    }

    # Serveur HTTPS principal
    server {
        listen 443 ssl;
        server_name localhost;

        # Configuration SSL
        ssl_certificate /etc/nginx/ssl/nginx-selfsigned.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx-selfsigned.key;

        # Protocoles et ciphers sécurisés
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Headers de sécurité
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Limite de taille pour upload d'images
        client_max_body_size 10M;

        # API Baseline
        location /api/baseline/ {
            proxy_pass http://baseline_backend/;
            proxy_set_header Host \$host;
            proxy_set_header X-Real-IP \$remote_addr;
            proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto \$scheme;
        }

        # API Sécurisée
        location /api/secured/ {
            proxy_pass http://secured_backend/;
            proxy_set_header Host \$host;
            proxy_set_header X-Real-IP \$remote_addr;
            proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto \$scheme;
        }

        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
        }
    }
}
